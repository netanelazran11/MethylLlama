# MethylLlama-Small fine-tuning configuration (256D × 4L × 4H)
#
# Fine-tuning for age prediction using 19,608 clean CpGs (zero NaN, no leakage).
# Vocab stays at 49,156 — same tokenizer as pretraining. Only 19,608 rows are
# ever looked up at fine-tune time; the remaining 29,548 rows are inert.
#
# NOTE: hydra loads finetune_llama.yaml (config_name="finetune_llama").
# This file documents the small-model defaults; sbatch overrides take precedence.

# ─────────────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────────────
data_path: ???           # finetuning_19608_clean.h5ad
checkpoint_path: null    # required for init_mode=pretrained; omit for init_mode=random
output_directory: ./outputs/finetune-llama-small
tokenizer_path: ./tokenizer_llama_pretrain49k

# ─────────────────────────────────────────────────────────────────────────────
# Encoder initialization
# ─────────────────────────────────────────────────────────────────────────────
init_mode: pretrained    # "pretrained": load WCED checkpoint | "random": train from scratch

# Architecture params — only used when init_mode=random (pretrained infers from ckpt)
model_arch:
  vocab_size: 49161
  hidden_size: 256
  num_hidden_layers: 4
  intermediate_size: 320
  num_attention_heads: 4
  n_sin_basis: 48

# ─────────────────────────────────────────────────────────────────────────────
# Data module
# ─────────────────────────────────────────────────────────────────────────────
data_module:
  batch_size: 8
  num_workers: 8
  max_length: 19609        # 19,608 CpGs + 1 CLS token
  subset_k: 49156          # pretrain tokenizer vocab — do not change
  fixed_subset_seed: 42

# ─────────────────────────────────────────────────────────────────────────────
# Input ratio — 1.0: all 19,608 measured CpGs fed as input; decoder disabled
# ─────────────────────────────────────────────────────────────────────────────
wced_input_ratio: 1.0

# ─────────────────────────────────────────────────────────────────────────────
# Age normalization — computed automatically from training split by dataset
# ─────────────────────────────────────────────────────────────────────────────
age_mean: 0.0
age_std: 1.0

# ─────────────────────────────────────────────────────────────────────────────
# Fine-tuning settings
# ─────────────────────────────────────────────────────────────────────────────
finetune:
  head_hidden_size: 256        # head: 256→256→128→1 (64D bottleneck removed)
  head_dropout: 0.1
  learning_rate: 1e-4          # MLP head lr
  encoder_lr: 5e-5             # encoder lr after unfreeze (5× lower than head)
  weight_decay: 0.01
  warmup_steps: 500
  freeze_encoder: true
  unfreeze_encoder_epoch: 10   # unfreeze encoder after head warmup
  recon_weight: 0.0            # disabled: input_ratio=1.0, no held-out CpGs
  pooling: cls                 # CLS pooler_output — matches WCED pretraining objective
  loss_type: mse              # mse or huber (if huber: delta must be in z-score space)

finetune_epochs: 150
accumulate_grad_batches: 16    # effective batch = 8 × 16 = 128
gradient_clip_val: 1.0
early_stop_patience: 30
precision: "16-mixed"

# ─────────────────────────────────────────────────────────────────────────────
# Fields
# ─────────────────────────────────────────────────────────────────────────────
fields:
  - _target_: bmfm_targets.config.FieldInfo
    name: cpg_ids
    padding_token: 0
    is_primary: true
  - _target_: bmfm_targets.config.FieldInfo
    name: beta_values
    padding_token: -4.0
    is_primary: false

# ─────────────────────────────────────────────────────────────────────────────
# Seed
# ─────────────────────────────────────────────────────────────────────────────
seed:
  seed_value: 42

# ─────────────────────────────────────────────────────────────────────────────
# WandB
# ─────────────────────────────────────────────────────────────────────────────
track_wandb:
  enabled: true
  project: "finetune-llama-small"
  entity: null
  name: "llama_small_wced_finetune"
